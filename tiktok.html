<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshBin Co. — TikTok</title>
  <meta http-equiv="refresh" content="2;url=https://www.tiktok.com/@freshbinco">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #091422;
      --teal: #00c896;
      --border: rgba(0,200,150,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 32px;
    }
    .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; color: #fff; }
    .logo-text .bin { color: var(--teal); }
    .card {
      background: rgba(13,27,42,1);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
    }
    .redirect-icon {
      width: 64px;
      height: 64px;
      background: #010101;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 10px; }
    p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.7; margin-bottom: 28px; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(0,200,150,0.15);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      background: var(--teal);
      color: #091422;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 9px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #00dfa8; }
    .back {
      display: block;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 13px;
      margin-top: 16px;
      transition: color 0.2s;
    }
    .back:hover { color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>
  <a href="/" class="logo">
    <svg width="24" height="30" viewBox="0 0 44 56" xmlns="http://www.w3.org/2000/svg">
      <rect x="14" y="0"  width="16" height="5"  rx="2.5" fill="#00c896"/>
      <rect x="4"  y="5"  width="36" height="7"  rx="3.5" fill="#00c896"/>
      <rect x="4"  y="12" width="36" height="2"  fill="rgba(255,255,255,0.3)"/>
      <rect x="6"  y="14" width="32" height="38" rx="3"   fill="#00c896"/>
      <rect x="13" y="17" width="2.5" height="32" rx="1.25" fill="rgba(255,255,255,0.18)"/>
      <rect x="21" y="17" width="2.5" height="32" rx="1.25" fill="rgba(255,255,255,0.18)"/>
      <rect x="29" y="17" width="2.5" height="32" rx="1.25" fill="rgba(255,255,255,0.18)"/>
    </svg>
    <span class="logo-text"><span class="fresh">Fresh</span><span class="bin">Bin</span> Co.</span>
  </a>

  <div class="card">
    <div class="redirect-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
        <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
      </svg>
    </div>
    <h1>Taking you to TikTok</h1>
    <p>Redirecting you to the FreshBin Co. TikTok page in a moment...</p>
    <div class="spinner"></div>
    <a href="https://www.tiktok.com/@freshbinco" class="btn">Open TikTok →</a>
    <a href="/" class="back">← Back to FreshBin Co.</a>
  </div>

  <script>
    setTimeout(() => { window.location.href = 'https://www.tiktok.com/@freshbinco'; }, 2000);
  </script>
</body>
</html>
